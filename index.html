        <td>${fmtINR(rev)}</td><td class="ci">100%</td>
        <td>${fmtINR(avgRev)}</td>
      </tr></tfoot>
    </table></div>
  </div>`;
}

function initDiagMgmt(){
  const d = diagGet(diagMo, diagTeam, diagType);
  const moData = DIAG.months.map(m => diagGet(m, diagTeam, diagType));
  const labs = DIAG.months;

  // Monthly trends (only shown when no month filter)
  if(!diagMo){
    try{
      bar('diag_mo_rev', labs, [{
        label:'Revenue',
        data: moData.map(m=>m.rev),
        backgroundColor:'rgba(26,107,74,.75)', borderRadius:5
      }]);
    }catch(e){}
    try{
      bar('diag_mo_ord', labs, [{
        label:'Orders',
        data: moData.map(m=>m.orders),
        backgroundColor:'rgba(14,165,233,.75)', borderRadius:5
      }]);
    }catch(e){}
  }

  // Team revenue bar
  const teamData = DIAG.teams
    .map(t=>({ team:t, rev: diagGet(diagMo,t,diagType).rev }))
    .filter(t=>t.rev>0)
    .sort((a,b)=>b.rev-a.rev);
  try{
    bar('diag_team_rev',
      teamData.map(t=>t.team),
      [{ label:'Revenue', data:teamData.map(t=>t.rev),
         backgroundColor:['rgba(26,107,74,.8)','rgba(14,165,233,.8)','rgba(168,85,247,.8)','rgba(249,115,22,.8)','rgba(34,197,94,.8)','rgba(239,68,68,.8)','rgba(250,204,21,.8)','rgba(129,140,248,.8)','rgba(244,114,182,.8)','rgba(59,130,246,.8)','rgba(167,139,250,.8)'],
         borderRadius:5 }]
    );
  }catch(e){}

  // Type donut
  const b2b = diagGet(diagMo, diagTeam, 'B2B');
  const b2c = diagGet(diagMo, diagTeam, 'B2C');
  try{
    donut('diag_type_donut',
      ['B2B Orders','B2C Orders','B2B Revenue (÷100)','B2C Revenue (÷100)'],
      [b2b.orders, b2c.orders],
      ['rgba(34,197,94,.85)','rgba(168,85,247,.85)']
    );
  }catch(e){}
  // Actually use a proper grouped approach
  try{
    mk('diag_type_donut','doughnut',{
      labels:['B2B','B2C'],
      datasets:[
        {label:'Orders', data:[b2b.orders,b2c.orders], backgroundColor:['rgba(34,197,94,.8)','rgba(168,85,247,.8)'], borderColor:'#fff',borderWidth:3},
      ]
    },{cutout:'60%',plugins:{legend:{display:true,position:'bottom',labels:{color:'#64748b',boxWidth:10,padding:8,font:{size:11}}},
      tooltip:{callbacks:{label:c=>{
        const tot = b2b.orders+b2c.orders;
        return `${c.label}: ${c.parsed} orders (${tot>0?(c.parsed/tot*100).toFixed(1):'0'}%)`;
      }}}}});
  }catch(e){}
}

function logKey(mo, sg){ return `${mo||''}|${sg||''}`; }
function logGet(mo, sg){ return LOGISTICS.lookup[logKey(mo, sg)] || {total:0,delivered:0,pending:0,rto:0,others:0,freight_total:0,freight_avg:0,status_counts:{},deliv_by_month:{}}; }

// ── Filter Bar ──
function logFilterBar(){
  const moOpts = LOGISTICS.months.map(m => `<option value="${m}" ${logMo===m?'selected':''}>${m}</option>`).join('');
  const sgDefs = [
    {val:'',         label:'All'},
    {val:'Delivered',label:'Delivered'},
    {val:'Pending',  label:'Pending'},
    {val:'RTO',      label:'RTO'},
    {val:'Others',   label:'Others'},
  ];
  const sgBtns = sgDefs.map(s =>
    `<button class="cgm-tog ${logStatus===s.val?'active':''}" onclick="setLogFilter('status','${s.val}')">${s.label}</button>`
  ).join('');
  return `<div class="cgm-filter-bar" style="flex-wrap:wrap;gap:16px">
    <div class="cfb-group">
      <span class="cfb-label">📅 Month</span>
      <select class="month-select" onchange="setLogFilter('mo',this.value)">
        <option value="" ${!logMo?'selected':''}>All Months</option>

      </select>

    <div class="cfb-divider"></div>
    <button class="cfb-reset" onclick="resetLogFilters()">↺ Reset</button>

}
function setLogFilter(key, val){
  if(key==='mo') logMo=val;
  else if(key==='status') logStatus=(logStatus===val&&val!=='')?'':val;

}
function resetLogFilters(){ logMo=''; logStatus=''; renderMSContent(); }

      <tbody>
        ${months.map(m=>{
          const md = logGet(m, logStatus);
          return `<tr>
            <td>${m}</td>
            <td>${num(md.total)}</td>
            <td class="ci">${num(md.delivered)}</td>
            <td class="ci">${pct(md.delivered, md.total)}</td>
            <td style="color:var(--warn)">${num(md.pending)}</td>
            <td style="color:var(--danger)">${num(md.rto)}</td>
            <td style="color:var(--muted)">${num(md.others)}</td>
            <td style="color:var(--accent)">${inr(md.freight_total)}</td>
            <td style="color:var(--accent)">${inr(md.freight_avg)}</td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot><tr>
        <td>TOTAL</td>
        <td>${num(logGet('', logStatus).total)}</td>
        <td class="ci">${num(logGet('', logStatus).delivered)}</td>
        <td class="ci">${pct(logGet('', logStatus).delivered, logGet('', logStatus).total)}</td>
        <td style="color:var(--warn)">${num(logGet('', logStatus).pending)}</td>
        <td style="color:var(--danger)">${num(logGet('', logStatus).rto)}</td>
        <td style="color:var(--muted)">${num(logGet('', logStatus).others)}</td>
        <td style="color:var(--accent)">${inr(logGet('', logStatus).freight_total)}</td>
        <td style="color:var(--accent)">${inr(logGet('', logStatus).freight_avg)}</td>
      </tfoot>
    </table></div>`;
  }
}

</script>
</body>
</html>
